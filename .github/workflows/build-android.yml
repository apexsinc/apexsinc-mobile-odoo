name: Build Android App

# The native Android project (android/) is intentionally NOT committed to
# this repo - it is generated fresh by `cap add android` on every run. This
# avoids hand-maintaining generated Gradle/Java boilerplate; all real
# customization (app id, name, icon, FCM config, signing) is applied here
# as CI steps so the whole build is reproducible from source control alone.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      track:
        description: 'What to build'
        required: true
        default: 'debug_apk'
        type: choice
        options:
          - debug_apk
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # No `cache: npm` here on purpose - that requires a committed
          # package-lock.json, which doesn't exist yet since npm was never
          # run against this package.json (no local Node toolchain to
          # generate one). `npm install` below will create/update it; once
          # it's committed to the repo, caching can be turned back on.

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          # Newer Android Gradle Plugin versions (pulled in by the latest
          # @capacitor/android release) require JDK 21, not just 17.
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android 16 (API 36) platform + build-tools
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Install dependencies
        # npm ci requires an existing package-lock.json (none is committed
        # yet - see the Setup Node.js step above). npm install both installs
        # and creates/updates the lockfile.
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Target Android 16 (API 36)
        # cap add android defaults to whatever compile/target SDK shipped
        # with the current @capacitor/android release, which lags behind
        # the newest platform - override it here since variables.gradle
        # gets regenerated from scratch on every run (nothing to hand-edit
        # and keep in sync).
        run: |
          sed -i \
            -e 's/compileSdkVersion = [0-9]*/compileSdkVersion = 36/' \
            -e 's/targetSdkVersion = [0-9]*/targetSdkVersion = 36/' \
            android/variables.gradle
          grep -E "compileSdkVersion|targetSdkVersion" android/variables.gradle

      - name: Generate app icon & splash screen
        run: |
          npm install --no-save @capacitor/assets
          npx capacitor-assets generate --android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Place Firebase config (google-services.json)
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo "::error::GOOGLE_SERVICES_JSON_BASE64 secret is not set - push notifications will not work in this build. See README for setup."
            exit 1
          fi
          echo "Secret length received: ${#GOOGLE_SERVICES_JSON_BASE64} chars (expect ~900)"
          # -i ignores stray whitespace/newlines that copy-paste into the
          # GitHub secret UI can introduce, rather than failing outright.
          echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 -d -i > android/app/google-services.json || true
          if ! python3 -c "import json; json.load(open('android/app/google-services.json'))" 2>/dev/null; then
            echo "::error::GOOGLE_SERVICES_JSON_BASE64 did not decode to valid JSON. Re-copy it with: base64 -w0 google-services.json"
            exit 1
          fi

      - name: Build debug APK (always, for internal sideloading)
        run: cd android && ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: apexsinc-mobile-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 90

      # --- Release build (Play Store) - only runs once signing is available ---
      # The keystore itself is committed to the repo (apexsinc-mobile-release.keystore,
      # exempted from .gitignore's *.keystore rule) since this is a private repo;
      # only the passwords/alias remain as GitHub secrets.
      - name: Check for release signing secrets
        id: has_signing
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" ] && [ -f apexsinc-mobile-release.keystore ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Copy release keystore into place
        if: steps.has_signing.outputs.present == 'true'
        run: cp apexsinc-mobile-release.keystore android/app/release.keystore

      - name: Configure release signing
        if: steps.has_signing.outputs.present == 'true'
        run: |
          cat > android/keystore.properties <<EOF
          storeFile=release.keystore
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF
          # Wire the properties file into the release signingConfig.
          # See android-signing.gradle.snippet in this repo for what gets applied.
          cat scripts/android-signing.gradle.snippet >> android/app/build.gradle

      - name: Build release APK + AAB
        if: steps.has_signing.outputs.present == 'true'
        run: |
          cd android
          ./gradlew assembleRelease bundleRelease

      - name: Upload release APK
        if: steps.has_signing.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: apexsinc-mobile-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Upload release AAB (Play Store)
        if: steps.has_signing.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: apexsinc-mobile-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 90
