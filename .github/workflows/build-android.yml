name: Build Android App

# The native Android project (android/) is intentionally NOT committed to
# this repo - it is generated fresh by `cap add android` on every run. This
# avoids hand-maintaining generated Gradle/Java boilerplate; all real
# customization (app id, name, icon, FCM config, signing) is applied here
# as CI steps so the whole build is reproducible from source control alone.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      track:
        description: 'What to build'
        required: true
        default: 'debug_apk'
        type: choice
        options:
          - debug_apk
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Add Android platform
        run: npx cap add android

      - name: Generate app icon & splash screen
        run: |
          npm install --no-save @capacitor/assets
          npx capacitor-assets generate --android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Place Firebase config (google-services.json)
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo "::error::GOOGLE_SERVICES_JSON_BASE64 secret is not set - push notifications will not work in this build. See README for setup."
            exit 1
          fi
          echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 -d > android/app/google-services.json

      - name: Build debug APK (always, for internal sideloading)
        run: cd android && ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: apexsinc-mobile-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 90

      # --- Release build (Play Store) - only runs once signing secrets exist ---
      - name: Check for release signing secrets
        id: has_signing
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Decode release keystore
        if: steps.has_signing.outputs.present == 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore

      - name: Configure release signing
        if: steps.has_signing.outputs.present == 'true'
        run: |
          cat > android/keystore.properties <<EOF
          storeFile=release.keystore
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF
          # Wire the properties file into the release signingConfig.
          # See android-signing.gradle.snippet in this repo for what gets applied.
          cat scripts/android-signing.gradle.snippet >> android/app/build.gradle

      - name: Build release APK + AAB
        if: steps.has_signing.outputs.present == 'true'
        run: |
          cd android
          ./gradlew assembleRelease bundleRelease

      - name: Upload release APK
        if: steps.has_signing.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: apexsinc-mobile-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Upload release AAB (Play Store)
        if: steps.has_signing.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: apexsinc-mobile-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 90
